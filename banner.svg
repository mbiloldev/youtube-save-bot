<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="50%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>

    <!-- Neon orange glow -->
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Neon purple glow -->
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Text glow filter -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for particles -->
    <filter id="particleGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Left accent gradient -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c00;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#ff8c00;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#c060ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c060ff;stop-opacity:0"/>
    </linearGradient>

    <!-- Grid lines gradient -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.03"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>

    <!-- Badge gradients -->
    <linearGradient id="badge1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8c00"/>
      <stop offset="100%" style="stop-color:#ff6000"/>
    </linearGradient>
    <linearGradient id="badge2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#2a1a5e"/>
    </linearGradient>
    <linearGradient id="badge3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d3320"/>
      <stop offset="100%" style="stop-color:#0a4422"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.4">
    <line x1="150" y1="0" x2="150" y2="300" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
    <line x1="450" y1="0" x2="450" y2="300" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
    <line x1="750" y1="0" x2="750" y2="300" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
    <line x1="0" y1="75" x2="900" y2="75" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
    <line x1="0" y1="150" x2="900" y2="150" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
    <line x1="0" y1="225" x2="900" y2="225" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
  </g>

  <!-- Animated floating particles -->
  <!-- Particle 1 -->
  <circle cx="80" cy="60" r="2.5" fill="#ff8c00" opacity="0.7" filter="url(#particleGlow)">
    <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Particle 2 -->
  <circle cx="820" cy="80" r="2" fill="#c060ff" opacity="0.6" filter="url(#particleGlow)">
    <animate attributeName="cy" values="80;55;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- Particle 3 -->
  <circle cx="480" cy="30" r="1.5" fill="#ff8c00" opacity="0.5">
    <animate attributeName="cy" values="30;50;30" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Particle 4 -->
  <circle cx="680" cy="250" r="2" fill="#c060ff" opacity="0.5" filter="url(#particleGlow)">
    <animate attributeName="cy" values="250;230;250" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="6s" repeatCount="indefinite"/>
  </circle>
  <!-- Particle 5 -->
  <circle cx="200" cy="240" r="1.5" fill="#4080ff" opacity="0.6">
    <animate attributeName="cy" values="240;260;240" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Particle 6 -->
  <circle cx="860" cy="190" r="1.8" fill="#ff8c00" opacity="0.4">
    <animate attributeName="cy" values="190;170;190" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="860;875;860" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Particle 7 -->
  <circle cx="40" cy="200" r="1.5" fill="#c060ff" opacity="0.5">
    <animate attributeName="cy" values="200;220;200" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated background glow blobs -->
  <ellipse cx="200" cy="150" rx="180" ry="100" fill="#ff8c00" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.07;0.03" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="720" cy="150" rx="200" ry="120" fill="#8020ff" opacity="0.04">
    <animate attributeName="opacity" values="0.04;0.08;0.04" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Left accent bar -->
  <rect x="55" y="60" width="4" height="180" rx="2" fill="url(#accentLine)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Decorative corner top-right -->
  <g opacity="0.5">
    <line x1="830" y1="20" x2="880" y2="20" stroke="#c060ff" stroke-width="1.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="880" y1="20" x2="880" y2="60" stroke="#c060ff" stroke-width="1.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Decorative corner bottom-left -->
  <g opacity="0.5">
    <line x1="20" y1="240" x2="70" y2="240" stroke="#ff8c00" stroke-width="1.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="240" x2="20" y2="280" stroke="#ff8c00" stroke-width="1.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Code tag top-right animated -->
  <text x="760" y="48" font-family="'Courier New', monospace" font-size="13" fill="#c060ff" opacity="0.9" filter="url(#textGlow)">
    &lt;mbiloldev/&gt;
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Main name - MUHAMMADBILOL -->
  <text x="78" y="130" font-family="'Arial Black', 'Impact', sans-serif" font-size="46" font-weight="900" fill="#ff8c00" filter="url(#textGlow)" letter-spacing="1">
    Muhammadbilol
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
  </text>

  <!-- Main name - QO'CHQOROV -->
  <text x="78" y="180" font-family="'Arial Black', 'Impact', sans-serif" font-size="46" font-weight="900" fill="#ffffff" filter="url(#textGlow)" letter-spacing="1">
    Qo'chqorov
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.3s" fill="freeze"/>
  </text>

  <!-- Animated underline below name -->
  <line x1="78" y1="190" x2="78" y2="190" stroke="#ff8c00" stroke-width="2.5" opacity="0.8">
    <animate attributeName="x2" values="78;520" dur="1.2s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </line>

  <!-- Badges row -->
  <!-- Badge 1: Full-Stack Developer -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
    <rect x="78" y="204" width="170" height="26" rx="13" fill="url(#badge1)"/>
    <rect x="78" y="204" width="170" height="26" rx="13" fill="none" stroke="#ff8c00" stroke-width="1"/>
    <text x="163" y="221" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Full-Stack Developer</text>
  </g>

  <!-- Badge 2: Telegram Bot Creator -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.2s" fill="freeze"/>
    <rect x="258" y="204" width="168" height="26" rx="13" fill="url(#badge2)"/>
    <rect x="258" y="204" width="168" height="26" rx="13" fill="none" stroke="#8844cc" stroke-width="1"/>
    <text x="342" y="221" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#cc88ff" text-anchor="middle" letter-spacing="0.5">Telegram Bot Creator</text>
  </g>

  <!-- Badge 3: IT Mentor since 2023 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.4s" fill="freeze"/>
    <rect x="436" y="204" width="150" height="26" rx="13" fill="url(#badge3)"/>
    <rect x="436" y="204" width="150" height="26" rx="13" fill="none" stroke="#00aa55" stroke-width="1"/>
    <text x="511" y="221" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#00dd66" text-anchor="middle" letter-spacing="0.5">IT Mentor since 2023</text>
  </g>

  <!-- Tech pills row -->
  <!-- Python -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.6s" fill="freeze"/>
    <rect x="78" y="244" width="62" height="22" rx="11" fill="#1a2a3a" stroke="#4a9eff" stroke-width="1"/>
    <text x="109" y="259" font-family="Arial, sans-serif" font-size="10.5" fill="#4a9eff" text-anchor="middle" font-weight="600">Python</text>
  </g>
  <!-- Django -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.7s" fill="freeze"/>
    <rect x="148" y="244" width="62" height="22" rx="11" fill="#0d2a1a" stroke="#00cc66" stroke-width="1"/>
    <text x="179" y="259" font-family="Arial, sans-serif" font-size="10.5" fill="#00cc66" text-anchor="middle" font-weight="600">Django</text>
  </g>
  <!-- JavaScript -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.8s" fill="freeze"/>
    <rect x="218" y="244" width="78" height="22" rx="11" fill="#2a2a0a" stroke="#ffcc00" stroke-width="1"/>
    <text x="257" y="259" font-family="Arial, sans-serif" font-size="10.5" fill="#ffcc00" text-anchor="middle" font-weight="600">JavaScript</text>
  </g>
  <!-- React -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.9s" fill="freeze"/>
    <rect x="304" y="244" width="56" height="22" rx="11" fill="#0a1e2e" stroke="#61dafb" stroke-width="1"/>
    <text x="332" y="259" font-family="Arial, sans-serif" font-size="10.5" fill="#61dafb" text-anchor="middle" font-weight="600">React</text>
  </g>
  <!-- C++ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.0s" fill="freeze"/>
    <rect x="368" y="244" width="50" height="22" rx="11" fill="#1a0a2a" stroke="#c060ff" stroke-width="1"/>
    <text x="393" y="259" font-family="Arial, sans-serif" font-size="10.5" fill="#c060ff" text-anchor="middle" font-weight="600">C++</text>
  </g>
  <!-- C# -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.1s" fill="freeze"/>
    <rect x="426" y="244" width="46" height="22" rx="11" fill="#1e0a2e" stroke="#9b4fff" stroke-width="1"/>
    <text x="449" y="259" font-family="Arial, sans-serif" font-size="10.5" fill="#9b4fff" text-anchor="middle" font-weight="600">C#</text>
  </g>
  <!-- aiogram -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.2s" fill="freeze"/>
    <rect x="480" y="244" width="66" height="22" rx="11" fill="#0a1e2e" stroke="#2ec0f9" stroke-width="1"/>
    <text x="513" y="259" font-family="Arial, sans-serif" font-size="10.5" fill="#2ec0f9" text-anchor="middle" font-weight="600">aiogram</text>
  </g>

  <!-- Social links -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="2.4s" fill="freeze"/>
    <text x="78" y="290" font-family="'Courier New', monospace" font-size="11" fill="#666688" letter-spacing="0.3">@it_mentor_uz  ·  github.com/mbiloldev  ·  Uzbekistan, Tashkent</text>
  </g>

  <!-- Animated scanning line effect -->
  <rect x="0" y="0" width="900" height="2" fill="url(#accentLine)" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,300;0,0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Right side decorative code block -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0.85" dur="0.8s" begin="2.6s" fill="freeze"/>
    <rect x="660" y="90" width="215" height="140" rx="8" fill="#080818" stroke="#1a1a3a" stroke-width="1"/>
    <rect x="660" y="90" width="215" height="18" rx="8" fill="#111128"/>
    <circle cx="674" cy="99" r="4" fill="#ff5f57"/>
    <circle cx="686" cy="99" r="4" fill="#febc2e"/>
    <circle cx="698" cy="99" r="4" fill="#28c840"/>
    <text x="750" y="101" font-family="'Courier New', monospace" font-size="8" fill="#555577" text-anchor="middle">profile.py</text>

    <text x="672" y="123" font-family="'Courier New', monospace" font-size="9.5" fill="#c060ff">class</text>
    <text x="706" y="123" font-family="'Courier New', monospace" font-size="9.5" fill="#ff8c00">Developer</text>
    <text x="754" y="123" font-family="'Courier New', monospace" font-size="9.5" fill="#ffffff">:</text>

    <text x="678" y="139" font-family="'Courier New', monospace" font-size="9" fill="#4a9eff">name</text>
    <text x="710" y="139" font-family="'Courier New', monospace" font-size="9" fill="#ffffff"> = </text>
    <text x="724" y="139" font-family="'Courier New', monospace" font-size="9" fill="#00cc66">"Bilol"</text>

    <text x="678" y="153" font-family="'Courier New', monospace" font-size="9" fill="#4a9eff">stack</text>
    <text x="710" y="153" font-family="'Courier New', monospace" font-size="9" fill="#ffffff"> = [</text>
    <text x="730" y="153" font-family="'Courier New', monospace" font-size="9" fill="#ffcc00">"py"</text>
    <text x="752" y="153" font-family="'Courier New', monospace" font-size="9" fill="#ffffff">,</text>
    <text x="757" y="153" font-family="'Courier New', monospace" font-size="9" fill="#ffcc00">"js"</text>
    <text x="777" y="153" font-family="'Courier New', monospace" font-size="9" fill="#ffffff">]</text>

    <text x="678" y="167" font-family="'Courier New', monospace" font-size="9" fill="#4a9eff">role</text>
    <text x="700" y="167" font-family="'Courier New', monospace" font-size="9" fill="#ffffff"> = </text>
    <text x="714" y="167" font-family="'Courier New', monospace" font-size="9" fill="#00cc66">"FullStack"</text>

    <text x="678" y="181" font-family="'Courier New', monospace" font-size="9" fill="#4a9eff">mentor</text>
    <text x="714" y="181" font-family="'Courier New', monospace" font-size="9" fill="#ffffff"> = </text>
    <text x="728" y="181" font-family="'Courier New', monospace" font-size="9" fill="#ff8c00">True</text>

    <!-- Blinking cursor -->
    <rect x="672" y="191" width="7" height="11" fill="#ff8c00" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0;0.9" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="681" y="201" font-family="'Courier New', monospace" font-size="9" fill="#555577">  # coding...</text>
  </g>

  <!-- Border frame (animated) -->
  <rect x="1" y="1" width="898" height="298" rx="12" fill="none" stroke="#ff8c00" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="3" y="3" width="894" height="294" rx="11" fill="none" stroke="#c060ff" stroke-width="0.5" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
